services:

  # ── Flask backend ─────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: preeclampsie_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
    networks:
      - net

  # ── Frontend HTML/CSS/JS (Nginx) ──────────────
  frontend:
    image: nginx:alpine
    container_name: preeclampsie_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    networks:
      - net

  # ── MySQL ─────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: preeclampsie_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: preeclampsie
      MYSQL_USER: preeclampsie_user
      MYSQL_PASSWORD: preeclampsie_pass
      MYSQL_ROOT_PASSWORD: root_secret_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret_pass"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - net

  # ── phpMyAdmin ────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: preeclampsie_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: preeclampsie_user
      PMA_PASSWORD: preeclampsie_pass
    depends_on:
      - db
    networks:
      - net

volumes:
  db_data:

networks:
  net:
    driver: bridge
